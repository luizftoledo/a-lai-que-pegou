name: Scrape semanal buscalai

on:
  schedule:
    # segunda 06:30 UTC — 1h30 antes do trigger Anthropic (08:00 UTC)
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar Playwright
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Coletar pedidos LAI
        run: |
          mkdir -p docs/data
          python scripts/coletar_buscalai.py 90 40
          cp /tmp/pedidos_detalhados.json docs/data/pedidos.json
          echo "Coletados: $(python3 -c 'import json;print(len(json.load(open(\"docs/data/pedidos.json\"))))')"

      - name: Commit JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "scrape: varredura semanal"
          file_pattern: "docs/data/**"
